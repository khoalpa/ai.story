[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ai-image"
version = "0.1.0"
description = "Standalone image generation package for AI Story Studio."
license = {text = "MIT"}
authors = [{name = "AI Story Studio"}]
requires-python = ">=3.10"
dependencies = ["requests==2.32.3", "streamlit>=1.43,<2", "Pillow>=10,<12"]

[project.scripts]
render-image-gui = "image.gui_entry:main"

[tool.setuptools]
package-dir = {"" = "../.."}
include-package-data = true

[tool.setuptools.packages.find]
where = ["../.."]
include = ["image*"]
exclude = ["image.local_models", "image.local_models.*"]

[tool.setuptools.package-data]
image = ["assets/workflows/*.json"]
