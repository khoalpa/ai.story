provider_id: custom_compatible
label: Custom OpenAI-compatible
description: Manually configure any endpoint compatible with chat completions.
default_profile_id: custom_blank
requires_api_key: false
profiles:
  - profile_id: custom_blank
    label: Custom manual
    description: Flexible manual endpoint/model/API key profile.
    base_url_env: OPENAI_BASE_URL
    base_url_fallback: http://localhost:1234/v1
    model_env: OPENAI_MODEL
    model_fallback: ''
    api_key_env: OPENAI_API_KEY
    api_key_fallback: ''
